<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shark CoinFlip</title>
    <link rel="icon" href="favicon.ico">
    <style>
        :root {
            --gold: #f1c40f;
            --silver: #bdc3c7;
        }
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f2f5;
        }
        #coin {
            width: 150px;
            height: 150px;
            cursor: pointer;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .side {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            backface-visibility: hidden;
            box-shadow: 0 8px 15px rgba(0,0,0,0.2);
            border: 5px solid rgba(0,0,0,0.1);
        }
        .heads {
            background-color: var(--gold);
            color: #8e44ad;
        }
        .tails {
            background-color: var(--silver);
            color: #2c3e50;
            transform: rotateY(180deg);
        }
        button {
            margin-top: 50px;
            padding: 12px 30px;
            font-size: 18px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        button:active {
            transform: scale(0.95);
        }
        #result {
            margin-top: 20px;
            font-size: 20px;
            font-weight: bold;
            height: 24px;
        }
    </style>
</head>
<body>

    <div id="coin">
        <div class="side heads">表</div>
        <div class="side tails">裏</div>
    </div>

    <br><br>
    <div id="resultText">タップしてスタート！</div>
    <button onclick="flipCoin()">コインを投げる</button>

    <script>
        let currentRotation = 0;

        function flipCoin() {
            const coin = document.getElementById('coin');
            const resultText = document.getElementById('resultText');
            
            const isHeads = Math.random() < 0.5;
            
            const extraDegrees = isHeads ? 0 : 180;
            currentRotation += 1800 + extraDegrees;

            coin.style.transform = `rotateY(${currentRotation}deg)`;
            
            resultText.innerText = "……。";

            setTimeout(() => {
                resultText.innerText = isHeads ? "【表】でした！" : "【裏】でした！";
            }, 600);
        }
    </script>
</body>
</html>
